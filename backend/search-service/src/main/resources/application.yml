# 智能搜索推荐服务 通用配置（默认激活 dev）
spring:
  application:
    name: search-service
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: 8084
  servlet:
    encoding:
      # 强制响应头携带 charset=UTF-8，避免 PowerShell 等客户端中文乱码
      charset: UTF-8
      force: true

# 跨服务调用地址（按环境可通过环境变量覆盖）
foodapp:
  services:
    recipe-url: http://localhost:8082
    user-url: http://localhost:8081
