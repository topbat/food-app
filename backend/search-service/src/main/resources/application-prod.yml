# prod 环境：MySQL 8.0（需先执行 sql/04_search.sql 建表），关闭 SQL 打印，根日志 INFO
# 说明：全文检索当前通过菜谱服务的结构化查询（/api/recipe/list）实现；
#       prod 后续可切换 Elasticsearch 做全文检索（分词、相关度排序、高亮），本服务只需替换 RecipeClient 的检索实现。
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/food_app?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

logging:
  level:
    root: INFO

# JWT 密钥与跨服务地址按环境注入，禁止硬编码
foodapp:
  jwt:
    secret: ${JWT_SECRET:请配置环境变量}
  services:
    recipe-url: ${RECIPE_SERVICE_URL:http://localhost:8082}
    user-url: ${USER_SERVICE_URL:http://localhost:8081}
