# 厨房引擎服务 通用配置（默认激活 dev）
spring:
  application:
    name: kitchen-service
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: 8083
  servlet:
    encoding:
      # 强制响应头携带 charset=UTF-8，避免 PowerShell 等客户端中文乱码
      charset: UTF-8
      force: true

# 跨服务地址：菜谱服务（创建会话时拉取菜谱名与步骤平铺列表）
foodapp:
  services:
    recipe-url: http://localhost:8082
