# uat 环境：MySQL 8.0（需先执行 sql/03_kitchen.sql 建表）
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/food_app?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

# JWT 密钥按环境注入，禁止硬编码
foodapp:
  jwt:
    secret: ${JWT_SECRET:请配置环境变量}
  # uat 环境跨服务地址：菜谱服务（可按部署拓扑改为内网地址）
  services:
    recipe-url: ${RECIPE_SERVICE_URL:http://localhost:8082}
