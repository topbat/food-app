# prod 环境：MySQL 8.0（需先执行 sql/03_kitchen.sql 建表），关闭 SQL 打印，根日志 INFO
#
# 计时器到点事件说明：
#   当前实现为「数据库存 expected_end_at + @Scheduled 每5秒扫描兜底」的轮询方案（模拟推送）。
#   prod 后续可引入 Redis：为每个计时器写入带 TTL 的键（TTL=剩余秒数），
#   订阅 Redis 过期键通知（keyevent expired）即可在到点瞬间推送计时完成事件，
#   替代数据库定时扫描，降低延迟与数据库压力。
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/food_app?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

logging:
  level:
    root: INFO

# JWT 密钥按环境注入，禁止硬编码
foodapp:
  jwt:
    secret: ${JWT_SECRET:请配置环境变量}
  # prod 环境跨服务地址：菜谱服务（按生产部署拓扑配置）
  services:
    recipe-url: ${RECIPE_SERVICE_URL:http://localhost:8082}
