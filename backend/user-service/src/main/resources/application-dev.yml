# dev 环境：H2 内存数据库（MySQL 兼容模式），零外部依赖即可启动
spring:
  datasource:
    url: jdbc:h2:mem:userdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
