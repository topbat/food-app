# prod 环境：MySQL 8.0（需先执行 sql/01_user.sql 建表），关闭 SQL 打印，根日志 INFO
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/food_app?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

logging:
  level:
    root: INFO

# JWT 密钥按环境注入，禁止硬编码
foodapp:
  jwt:
    secret: ${JWT_SECRET:请配置环境变量}
