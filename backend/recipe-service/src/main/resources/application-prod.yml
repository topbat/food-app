# prod 环境：MySQL 8.0，INFO 日志，关闭 SQL 打印
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/food_app?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

foodapp:
  jwt:
    secret: ${JWT_SECRET:foodapp-prod-secret-key-must-be-at-least-256-bits-long!}
  cors:
    allowed-origins: http://localhost:5173

logging:
  level:
    root: INFO
    com.foodapp: INFO
