# uat 环境：MySQL 8.0，结构由 sql/02_recipe.sql 维护（ddl-auto=none）
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/food_app?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

foodapp:
  jwt:
    secret: ${JWT_SECRET:foodapp-uat-secret-key-must-be-at-least-256-bits-long!}
  cors:
    allowed-origins: http://localhost:5173

logging:
  level:
    com.foodapp: INFO
