# dev 环境：H2 内存库（MySQL 兼容模式）+ data.sql 种子数据
spring:
  datasource:
    url: jdbc:h2:mem:recipedb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    # 先由 JPA 建表，再执行 data.sql 灌入种子数据
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      encoding: UTF-8
  h2:
    console:
      enabled: true
      path: /h2-console

foodapp:
  jwt:
    secret: foodapp-dev-secret-key-must-be-at-least-256-bits-long!
  cors:
    allowed-origins: http://localhost:5173

logging:
  level:
    com.foodapp: DEBUG
