# uat 环境：MySQL 8.0（需先执行 sql/06_file.sql 建表）+ 环境变量注入对象存储配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/food_app?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

# JWT 密钥按环境注入，禁止硬编码
foodapp:
  jwt:
    secret: ${JWT_SECRET:请配置环境变量}
  # 对象存储：默认 MinIO（环境变量注入连接信息）
  # 切换阿里云 OSS 方法：
  #   1) 设 STORAGE_TYPE=aliyun（或直接改 type: aliyun）
  #   2) 注入 OSS_ENDPOINT（如 oss-cn-hangzhou.aliyuncs.com）、OSS_BUCKET、OSS_ACCESS_KEY_ID、OSS_ACCESS_KEY_SECRET
  #   3) OSS bucket 需开通「公共读」，访问 URL 形如 https://{bucket}.{endpoint}/{objectKey}
  storage:
    type: ${STORAGE_TYPE:minio}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:food-app}
    aliyun:
      endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
      bucket: ${OSS_BUCKET:food-app}
      access-key-id: ${OSS_ACCESS_KEY_ID:}
      access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
