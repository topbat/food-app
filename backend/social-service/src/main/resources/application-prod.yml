# prod 环境：MySQL 8.0（需先执行 sql/05_social.sql 建表并自行初始化 social_badge 徽章字典），关闭 SQL 打印，根日志 INFO
# 说明：评论/动态属于高写入低关系型数据，后续可迁移 MongoDB（文档模型更契合楼中楼与图片列表）；当前阶段统一用 MySQL 实现
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/food_app?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

logging:
  level:
    root: INFO

# JWT 密钥按环境注入，禁止硬编码
foodapp:
  jwt:
    secret: ${JWT_SECRET:请配置环境变量}
  services:
    user-url: ${USER_SERVICE_URL:http://localhost:8081}
