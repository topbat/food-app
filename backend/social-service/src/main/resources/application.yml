# 社交与UGC服务 通用配置（默认激活 dev）
spring:
  application:
    name: social-service
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: 8085
  servlet:
    encoding:
      # 强制响应头携带 charset=UTF-8，避免 PowerShell 等客户端中文乱码
      charset: UTF-8
      force: true

# 跨服务地址：评论/帖子列表展示昵称头像时调用用户服务公开接口
foodapp:
  services:
    user-url: http://localhost:8081
